name: 🏗️ Build iOSMemScan IPA

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          brew install xcodegen || brew upgrade xcodegen
          curl -L -o /tmp/ldid https://github.com/ProcursusTeam/ldid/releases/download/v2.1.5-procursus7/ldid_macosx_arm64
          chmod +x /tmp/ldid && sudo mv /tmp/ldid /usr/local/bin/ldid

      - name: Generate Xcode project
        run: |
          echo "--- PWD ---"
          pwd
          echo "--- LS ---"
          ls -la
          xcodegen generate
          ls -la *.xcodeproj

      - name: Build
        run: |
          xcodebuild build -project iOSMemScan.xcodeproj \
                           -scheme iOSMemScan \
                           -configuration Release \
                           -sdk iphoneos \
                           -derivedDataPath /tmp/DD \
                           CODE_SIGN_IDENTITY="" \
                           CODE_SIGNING_REQUIRED=NO \
                           CODE_SIGNING_ALLOWED=NO 2>&1 | tee build.log
          if [ ${PIPESTATUS[0]} -ne 0 ]; then tail -30 build.log; exit 1; fi

      - name: Sign with ldid
        run: |
          APP=$(find /tmp/DD -name "*.app" -type d | head -1)
          echo "APP_PATH=$APP" >> $GITHUB_ENV
          cp iOSMemScan/Resources/Entitlements.plist "$APP/"
          ldid -SiOSMemScan/Resources/Entitlements.plist "$APP/iOSMemScan"

      - name: Package IPA
        run: |
          mkdir -p /tmp/ipa/Payload
          cp -R "${{ env.APP_PATH }}" /tmp/ipa/Payload/
          cd /tmp/ipa && zip -qr iOSMemScan.ipa Payload/
          echo "IPA=/tmp/ipa/iOSMemScan.ipa" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: iOSMemScan.ipa
          path: ${{ env.IPA }}
